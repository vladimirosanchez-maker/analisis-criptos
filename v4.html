<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Crypto Dashboard V4</title>

<style>
body{
background:#111;
color:white;
font-family:Arial,sans-serif;
padding:15px;
}

h1{
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #333;
text-align:center;
}

.verde{
color:#00ff88;
font-weight:bold;
}

.rojo{
color:#ff6666;
font-weight:bold;
}
</style>

</head>

<body>

<h1>Crypto Dashboard V4</h1>

<table>

<thead>
<tr>
<th>Cripto</th>
<th>Precio USD</th>
</tr>
</thead>

<tbody id="tabla"></tbody>

</table>

<script>

const monedas=[
"bitcoin",
"ethereum",
"solana",
"ripple",
"aave"
];

async function cargar(){

const url=
"https://api.coingecko.com/api/v3/simple/price?ids="
+
monedas.join(",")
+
"&vs_currencies=usd";

const r=await fetch(url);

const datos=await r.json();

let html="";

for(let moneda of monedas){

html+=`
<tr>
<td>${moneda}</td>
<td>${datos[moneda].usd}</td>
</tr>
`;

}

document.getElementById(
"tabla"
).innerHTML=html;

}

cargar();

setInterval(
cargar,
5000
);

</script>

</body>
</html>
